<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' blob: data:; media-src 'self' blob: data:; script-src 'self'; style-src 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AA</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="page-chat">
  <header class="top">
    <nav class="nav" aria-label="Pages">
      <a href="chat.html" class="nav__tab is-active" aria-current="page">Chat</a>
      <a href="history.html" class="nav__tab">History</a>
      <a href="search.html" class="nav__tab">Search</a>
      <a href="embedding.html" class="nav__tab">Embeddings</a>
      <a href="scheduler.html" class="nav__tab">Scheduler</a>
      <a href="settings.html" class="nav__tab">Settings</a>
    </nav>
  </header>

  <main class="page">
    <div class="col-head">
      <span id="chat-title" class="col-head__title">Chat</span>
      <button
        type="button"
        id="btn-clear-chat"
        class="col-head__clear"
        title="Clear saved chat on this device"
        aria-label="Clear chat history"
      >
        Clear
      </button>
    </div>
    <div id="messages" class="messages" role="log" aria-live="polite"></div>
    <form id="compose" class="compose" autocomplete="off">
      <div class="compose-shell">
        <textarea id="input" class="compose-shell__input" rows="3" placeholder="Send a message…"></textarea>
        <div class="compose-shell__bar">
          <input type="file" id="attach-files" multiple accept="audio/*,image/*" hidden />
          <button type="button" class="compose-shell__add" id="btn-attach" title="Attach" aria-label="Attach">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M8 2.5v11M2.5 8h11" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" />
            </svg>
          </button>
          <div id="attach-list" class="compose-shell__attach-meta" aria-live="polite"></div>
          <button type="submit" class="compose-shell__send" id="btn-send" title="Send" aria-label="Send">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 19V6M5 13l7-7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
      </div>
    </form>
  </main>

  <script src="./whisper-audio.js"></script>
  <script src="./chat.js"></script>
</body>
</html>
