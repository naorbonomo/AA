<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AA · Chat</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="page-chat">
  <header class="top">
    <nav class="nav" aria-label="Pages">
      <a href="chat.html" class="nav__tab is-active" aria-current="page">Chat</a>
      <a href="scheduler.html" class="nav__tab">Scheduler</a>
      <a href="settings.html" class="nav__tab">Settings</a>
    </nav>
  </header>

  <main class="page">
    <div class="col-head"><span id="chat-title">Chat</span></div>
    <div id="messages" class="messages" role="log" aria-live="polite"></div>
    <form id="compose" class="compose" autocomplete="off">
      <div class="compose-tools">
        <input type="file" id="attach-files" multiple hidden />
        <button type="button" class="compose-tools__btn" id="btn-attach" title="Attach files; model can call stt on audio using exact file name">
          Attach
        </button>
        <div id="attach-list" class="compose-attach-list" aria-live="polite"></div>
      </div>
      <div class="compose-row">
        <textarea id="input" rows="2" placeholder="Message…"></textarea>
        <button type="submit" id="btn-send">Send</button>
      </div>
    </form>
  </main>

  <script src="./whisper-audio.js"></script>
  <script src="./chat.js"></script>
</body>
</html>
